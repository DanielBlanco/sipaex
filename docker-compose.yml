services:
  postgres:
    image: postgres:16-alpine
    container_name: sipaex-postgres
    environment:
      POSTGRES_USER: sipaex
      POSTGRES_PASSWORD: sipaex_dev_password
      POSTGRES_DB: sipaex_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sipaex -d sipaex_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
